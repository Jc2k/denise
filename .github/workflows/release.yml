name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (os => ${{ matrix.runs-on }}, manylinux => ${{ matrix.manylinux }}, arch => ${{ matrix.target }}, snakes => ${{ matrix.snakes }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
        runs-on: [ubuntu-latest, macos-latest, windows-latest]
        manylinux: [auto, musllinux_1_2]
        snakes: ["3.11"]

        exclude:
          - runs-on: macos-latest
            manylinux: musllinux_1_2
          - runs-on: windows-latest
            manylinux: musllinux_1_2

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -i ${{ matrix.snakes }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-{{matrix.runs-on }}-{{ matrix.manylinux }}-${{ matrix.target }}
          path: dist

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/paula
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
